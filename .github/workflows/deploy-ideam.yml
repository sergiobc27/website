name: Deploy IDEAM Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "src/**"
      - "tests/**"
      - "wrangler.jsonc"
      - "cloudflare/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "postcss.config.mjs"
      - "default_shadcn_theme.css"
      - ".github/workflows/deploy-ideam.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Check Cloudflare secrets
        id: cloudflare_secrets
        shell: bash
        run: |
          if [[ -n "$CLOUDFLARE_API_TOKEN" && -n "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare deploy skipped because CLOUDFLARE_API_TOKEN is not configured."
          fi

      - name: Checkout
        if: steps.cloudflare_secrets.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.cloudflare_secrets.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        if: steps.cloudflare_secrets.outputs.ready == 'true'
        run: npm install

      - name: Build frontend
        if: steps.cloudflare_secrets.outputs.ready == 'true'
        run: npm run build

      - name: Ensure export bucket
        if: steps.cloudflare_secrets.outputs.ready == 'true'
        run: npx wrangler r2 bucket create ideam-exports || true

      - name: Enforce one-hour export lifecycle
        if: steps.cloudflare_secrets.outputs.ready == 'true'
        run: npx wrangler r2 bucket lifecycle set ideam-exports --file cloudflare/r2-lifecycle.json

      - name: Deploy to Cloudflare
        if: steps.cloudflare_secrets.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Warm IDEAM catalog bundles
        if: steps.cloudflare_secrets.outputs.ready == 'true'
        env:
          IDEAM_BASE_URL: https://ideam.sergiobc.com
          CATALOG_WARM_CONCURRENCY: "2"
        run: npm run warm:catalogs
