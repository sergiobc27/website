name: Deploy IDEAM Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "workers/ideam.js"
      - "wrangler.jsonc"
      - "package.json"
      - ".github/workflows/deploy-ideam.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: npm run check

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
