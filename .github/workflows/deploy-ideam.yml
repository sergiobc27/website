name: Deploy IDEAM Worker

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "src/**"
      - "tests/**"
      - "wrangler.jsonc"
      - "cloudflare/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "postcss.config.mjs"
      - "default_shadcn_theme.css"
      - ".github/workflows/deploy-ideam.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: npm run check

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Build frontend
        run: npm run build

      - name: Validate Worker bundle (dry-run)
        run: npx wrangler deploy --dry-run

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Check Cloudflare secrets
        id: cloudflare_secrets
        shell: bash
        run: |
          if [[ -n "$CLOUDFLARE_API_TOKEN" && -n "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare deploy skipped because CLOUDFLARE_API_TOKEN is not configured."
          fi

      - name: Checkout
        if: steps.cloudflare_secrets.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.cloudflare_secrets.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        if: steps.cloudflare_secrets.outputs.ready == 'true'
        run: npm install

      - name: Build frontend
        if: steps.cloudflare_secrets.outputs.ready == 'true'
        run: npm run build

      # El Worker-proxy autentica contra la API propia con este secreto.
      # Se sincroniza ANTES del deploy: la version vieja lo ignora y la nueva
      # lo hereda (los secrets de Workers sobreviven a los deploys).
      - name: Sincronizar secreto del proxy (IDEAM_PROXY_SECRET)
        if: steps.cloudflare_secrets.outputs.ready == 'true'
        shell: bash
        env:
          PROXY_SECRET: ${{ secrets.IDEAM_PROXY_SECRET }}
        run: |
          if [[ -n "$PROXY_SECRET" ]]; then
            printf '%s' "$PROXY_SECRET" | npx wrangler secret put IDEAM_PROXY_SECRET
          else
            echo "IDEAM_PROXY_SECRET no esta en los secrets del repo; se omite (la API rechazara las llamadas)."
          fi

      - name: Deploy to Cloudflare
        if: steps.cloudflare_secrets.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Informativo, no bloqueante: el E2E de produccion se revisara tras el corte.
      - name: Production smoke test
        if: steps.cloudflare_secrets.outputs.ready == 'true'
        continue-on-error: true
        env:
          IDEAM_BASE_URL: https://ideam.sergiobc.com
        run: npm run e2e:prod
