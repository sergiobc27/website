name: Deploy IDEAM Worker

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "src/**"
      - "public/**"
      - "tests/**"
      - "wrangler.jsonc"
      - "cloudflare/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "postcss.config.mjs"
      - ".github/workflows/deploy-ideam.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      # npm run check recorre TODOS los .js de src/worker (no solo index.js),
      # via scripts/check-worker-syntax.mjs (hallazgo de auditoria).
      - name: Syntax check
        run: npm run check

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Run unit tests (vitest)
        run: npm run test:unit

      # Bloqueante solo con severidad high o superior en dependencias de
      # produccion: una vulnerabilidad low/moderate no debe congelar el deploy
      # de un sitio en vivo (hallazgo de auditoria); su remediacion la lleva
      # Dependabot.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      # Solo VISIBILIDAD (no bloquea): incluye dev-deps (wrangler/miniflare/
      # undici, la cadena de build) para que las high de dev no queden ciegas.
      - name: Audit all dependencies (informativo, no bloqueante)
        run: npm audit --audit-level=high || true

      - name: Build frontend
        env:
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
        run: npm run build

      - name: Validate Worker bundle (dry-run)
        run: npx wrangler deploy --dry-run

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Check Cloudflare secrets
        id: cloudflare_secrets
        shell: bash
        run: |
          if [[ -n "$CLOUDFLARE_API_TOKEN" && -n "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare deploy skipped because CLOUDFLARE_API_TOKEN is not configured."
          fi

      - name: Checkout
        if: steps.cloudflare_secrets.outputs.ready == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        if: steps.cloudflare_secrets.outputs.ready == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install dependencies
        if: steps.cloudflare_secrets.outputs.ready == 'true'
        run: npm install

      - name: Build frontend
        if: steps.cloudflare_secrets.outputs.ready == 'true'
        env:
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
        run: npm run build

      # El Worker-proxy autentica contra la API propia con este secreto.
      # Se sincroniza ANTES del deploy: la version vieja lo ignora y la nueva
      # lo hereda (los secrets de Workers sobreviven a los deploys).
      - name: Sincronizar secreto del proxy (IDEAM_PROXY_SECRET)
        if: steps.cloudflare_secrets.outputs.ready == 'true'
        shell: bash
        env:
          PROXY_SECRET: ${{ secrets.IDEAM_PROXY_SECRET }}
        run: |
          if [[ -n "$PROXY_SECRET" ]]; then
            printf '%s' "$PROXY_SECRET" | npx wrangler secret put IDEAM_PROXY_SECRET
          else
            echo "IDEAM_PROXY_SECRET no esta en los secrets del repo; se omite (la API rechazara las llamadas)."
          fi

      # Secretos del envio de correo (Resend) y del anti-bot (Turnstile). Como
      # IDEAM_PROXY_SECRET: se sincronizan antes del deploy y sobreviven a este.
      - name: Sincronizar secretos de correo (Resend + Turnstile)
        if: steps.cloudflare_secrets.outputs.ready == 'true'
        shell: bash
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
        run: |
          if [[ -n "$RESEND_API_KEY" ]]; then
            printf '%s' "$RESEND_API_KEY" | npx wrangler secret put RESEND_API_KEY
          else
            echo "RESEND_API_KEY no esta en los secrets del repo; el envio de correo respondera 502."
          fi
          if [[ -n "$TURNSTILE_SECRET_KEY" ]]; then
            printf '%s' "$TURNSTILE_SECRET_KEY" | npx wrangler secret put TURNSTILE_SECRET_KEY
          else
            echo "TURNSTILE_SECRET_KEY no esta en los secrets del repo; el envio de correo respondera 403."
          fi

      - name: Deploy to Cloudflare
        if: steps.cloudflare_secrets.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Informativo, no bloqueante: el E2E de produccion se revisara tras el corte.
      - name: Production smoke test
        if: steps.cloudflare_secrets.outputs.ready == 'true'
        continue-on-error: true
        env:
          IDEAM_BASE_URL: https://ideam.sergiobc.com
        run: npm run e2e:prod
