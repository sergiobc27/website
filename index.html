<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>AUTOMATIZACIÓN DE DATOS HÍDRICOS DEL IDEAM</title>
    <!-- Favicon: logo CUC (la "U") sobre azulejo rojo institucional #A3161A. -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
    <script>
      // Anti-FOUC: aplica el tema antes del primer paint. Debe mantenerse en
      // sincronía con src/app/lib/theme.ts (misma clave 'ideam-theme' y los
      // tres valores 'light' | 'dark' | 'system').
      (function () {
        try {
          var choice = localStorage.getItem('ideam-theme') || 'system';
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = choice === 'dark' || (choice === 'system' && prefersDark);
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <!-- Cloudflare Web Analytics (sin cookies, sin datos personales). Token
         público por diseño. SIN integrity: Cloudflare actualiza beacon.min.js
         y un hash SRI lo rompería (excepción intencional a la regla de SRI). -->
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js'
            data-cf-beacon='{"token": "8836b6ec3b264eda9e4abafafb895110"}'></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
